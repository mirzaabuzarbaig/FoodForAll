<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>Issue Ration — Smart Public Distribution System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2ff;
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 0 0.5rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 1rem;
    }

    .logo-title {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .logo-title span.o {
      color: #ff9933;
    }

    .logo-title span.g {
      color: #138808;
    }

    .logo-sub {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.62rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .nav-item.active {
      background: linear-gradient(135deg, rgba(255, 153, 51, 0.25), rgba(19, 136, 8, 0.15));
      color: #fff;
      border: 1px solid rgba(255, 153, 51, 0.2);
    }

    .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .nav-spacer {
      flex: 1;
    }

    .nav-user {
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.07);
      margin-top: 0.5rem;
    }

    .nav-user-name {
      color: #fff;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .nav-user-role {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── MAIN ── */
    .main {
      margin-left: 240px;
      flex: 1;
      padding: 2rem;
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
    }

    .topbar-left h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a4e;
    }

    .topbar-left p {
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 2px;
    }

    /* ── ALERT ── */
    .alert-box {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.78rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .alert-box.show-success {
      display: flex;
      background: #f0fff4;
      color: #1a7a3e;
      border: 1px solid #c3e6cb;
    }

    .alert-box.show-danger {
      display: flex;
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #ffd5d5;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(48, 43, 99, 0.08);
    }

    .form-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a4e;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card-title i {
      color: #ff9933;
      font-size: 18px;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      font-size: 0.68rem;
      font-weight: 600;
      color: #888;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.8px;
    }

    .inp-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #ebebf5;
      border-radius: 11px;
      padding: 0 14px;
      background: #fafafa;
      transition: all 0.25s;
    }

    .inp-wrap:hover {
      border-color: #ff9933;
      background: #fff;
    }

    .inp-wrap:focus-within {
      border-color: #302b63;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(48, 43, 99, 0.07);
    }

    .inp-wrap.locked {
      border-color: #c8e6c9;
      background: #f0fff4;
    }

    .inp-wrap.locked input {
      color: #1a7a3e;
      font-weight: 700;
      cursor: not-allowed;
    }

    .inp-wrap.warning {
      border-color: #ffe0b2;
      background: #fff8f0;
    }

    .inp-wrap.warning input {
      color: #e65100;
      font-weight: 600;
      cursor: not-allowed;
    }

    .inp-ico {
      font-size: 13px;
      margin-right: 10px;
      opacity: 0.4;
      color: #302b63;
    }

    .inp-wrap input,
    .inp-wrap select {
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      color: #1a1a4e;
      padding: 11px 0;
      width: 100%;
    }

    .inp-wrap input::placeholder {
      color: #ccc;
    }

    .field-hint {
      font-size: 0.68rem;
      margin-top: 5px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
      display: none;
    }

    .field-hint.show {
      display: block;
    }

    .field-hint.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .field-hint.warning {
      background: #fff3e0;
      color: #e65100;
    }

    .field-hint.info {
      background: #e3f2fd;
      color: #1565c0;
    }

    /* qty locked tag */
    .lock-tag {
      font-size: 0.6rem;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
      margin-left: 6px;
      letter-spacing: 0.3px;
    }

    .lock-tag.warn {
      background: #fff3e0;
      color: #e65100;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff9933, #302b63, #138808);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(48, 43, 99, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ── TABLE CARD ── */
    .table-card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(48, 43, 99, 0.07);
    }

    .table-card-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .table-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: #1a1a4e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .table-card-title i {
      color: #ff9933;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #ebebf5;
      border-radius: 10px;
      padding: 0 12px;
      background: #fafafa;
      transition: all 0.25s;
    }

    .search-wrap:focus-within {
      border-color: #302b63;
      background: #fff;
    }

    .search-wrap input {
      border: none;
      outline: none;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      color: #1a1a4e;
      padding: 8px 0;
      width: 180px;
      background: transparent;
    }

    .search-wrap input::placeholder {
      color: #ccc;
    }

    .search-btn {
      background: none;
      border: none;
      color: #302b63;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      margin-left: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    thead th {
      color: #bbb;
      font-weight: 600;
      text-align: left;
      padding: 0 0 10px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #f0f0f8;
    }

    tbody td {
      padding: 11px 0;
      border-bottom: 1px solid #f8f8fc;
      color: #555;
      vertical-align: middle;
    }

    tbody td:first-child {
      font-weight: 600;
      color: #1a1a4e;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    @media(max-width:900px) {
      .sidebar {
        display: none;
      }

      .main {
        margin-left: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title"><span class="o">Smart</span> Public<br />Distribution <span class="g">System</span></div>
      <div class="logo-sub">Admin Portal</div>
    </div>
    <a href="/dashboard.html" class="nav-item"><i class="bi bi-speedometer2 nav-icon"></i> Dashboard</a>
    <a href="/admin.html" class="nav-item"><i class="bi bi-box-seam nav-icon"></i> Manage Stock</a>
    <a href="/issue-ration.html" class="nav-item active"><i class="bi bi-bag-check nav-icon"></i> Issue Ration</a>

    <a href="/alerts.html" class="nav-item"><i class="bi bi-bell nav-icon"></i> Alerts</a>

    <a href="/admin-settings.html" class="nav-item"><i class="bi bi-gear nav-icon"></i> Settings</a>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <div class="nav-user-name" id="sidebarUser">Admin User</div>
      <div class="nav-user-role">Administrator</div>
    </div>
    <a href="/auth/logout" class="nav-item" style="margin-top:8px;"><i class="bi bi-box-arrow-right nav-icon"></i>
      Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Issue Ration</h1>
        <p>Distribute ration items to beneficiaries</p>
      </div>
    </div>

    <div id="alertBox" class="alert-box"></div>

    <div class="layout">

      <!-- LEFT: ISSUE FORM -->
      <div class="form-card">
        <div class="form-card-title">
          <i class="bi bi-bag-check-fill"></i> Issue Ration to Beneficiary
        </div>

        <div class="field">
          <label>RATION CARD NUMBER</label>
          <div class="inp-wrap">
            <i class="bi bi-credit-card inp-ico"></i>
            <input type="text" id="rationCard" placeholder="e.g. RC-001234" />
          </div>
        </div>

        <div class="field">
          <label>BENEFICIARY NAME</label>
          <div class="inp-wrap">
            <i class="bi bi-person inp-ico"></i>
            <input type="text" id="beneficiaryName" placeholder="Full name" />
          </div>
        </div>

        <div class="field">
          <label>NUMBER OF FAMILY MEMBERS</label>
          <div class="inp-wrap">
            <i class="bi bi-people inp-ico"></i>
            <input type="number" id="familyMembers" placeholder="e.g. 4" min="1" />
          </div>
        </div>

        <div class="field">
          <label>SELECT ITEM</label>
          <div class="inp-wrap">
            <i class="bi bi-box-seam inp-ico"></i>
            <select id="stockItem">
              <option value="">-- Select Item --</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label id="qtyLabel">
            QUANTITY
            <span class="lock-tag d-none" id="lockTag">AUTO-CALCULATED 🔒</span>
          </label>
          <div class="inp-wrap" id="qtyWrap">
            <i class="bi bi-123 inp-ico"></i>
            <input type="number" id="quantity" placeholder="Select item and enter family members" />
          </div>
          <div class="field-hint" id="qtyHint"></div>
        </div>

        <button class="btn-submit" id="issueBtn" onclick="issueRation()">
          <i class="bi bi-check-circle"></i> Issue Ration
        </button>
      </div>

      <!-- RIGHT: TRANSACTIONS TABLE -->
      <div class="table-card">
        <div class="table-card-hdr">
          <div class="table-card-title">
            <i class="bi bi-receipt"></i> Transaction History
          </div>
          <div class="search-wrap">
            <i class="bi bi-search" style="color:#bbb;font-size:13px;"></i>
            <input type="text" id="searchCard" placeholder="Search by ration card..." />
            <button class="search-btn" onclick="searchTransactions()">
              <i class="bi bi-arrow-right"></i>
            </button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Card No</th>
              <th>Beneficiary</th>
              <th>Item</th>
              <th>Qty</th>
              <th>Issued By</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="transactionTableBody">
            <tr>
              <td colspan="6" style="text-align:center;color:#bbb;padding:2rem 0;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="/js/ration.js"></script>
  <script>
    async function checkAuth() {
      const res = await fetch('/auth/me');
      const data = await res.json();
      if (!data.success) { window.location.href = '/'; return; }
      const el = document.getElementById('sidebarUser');
      if (el) el.textContent = data.user.name;
    }
    checkAuth();
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <title>My Alerts — Smart Public Distribution System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Poppins',sans-serif;background:#f0f2ff;min-height:100vh;}

    /* ── NAVBAR ── */
    .navbar{background:linear-gradient(135deg,#0f0c29,#302b63);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(48,43,99,0.2);}
    .nav-brand{display:flex;flex-direction:column;}
    .nav-brand-name{color:#fff;font-size:0.95rem;font-weight:700;line-height:1.2;}
    .nav-brand-name span.o{color:#ff9933;}
    .nav-brand-name span.g{color:#138808;}
    .nav-brand-sub{color:rgba(255,255,255,0.35);font-size:0.6rem;letter-spacing:1px;text-transform:uppercase;}
    .nav-right{display:flex;align-items:center;gap:10px;}
    .nav-user-pill{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:6px 14px;color:#fff;font-size:0.75rem;font-weight:500;display:flex;align-items:center;gap:6px;}
    .nav-btn{padding:7px 16px;border-radius:10px;font-family:'Poppins',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
    .nav-btn-outline{border:1.5px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);background:transparent;}
    .nav-btn-outline:hover{background:rgba(255,255,255,0.1);color:#fff;}
    .nav-btn-active{border:1.5px solid rgba(255,153,51,0.5);color:#ff9933;background:rgba(255,153,51,0.1);}

    /* ── PAGE ── */
    .page{padding:2rem;max-width:1100px;margin:0 auto;}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.8rem;}
    .topbar h1{font-size:1.3rem;font-weight:700;color:#1a1a4e;}
    .topbar p{font-size:0.75rem;color:#aaa;margin-top:2px;}
    .refresh-btn{padding:8px 16px;border:1.5px solid #e0e0f0;border-radius:10px;background:#fff;color:#302b63;font-family:'Poppins',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:6px;}
    .refresh-btn:hover{background:#f5f3ff;border-color:#302b63;}

    /* ── SECTIONS ── */
    .section{margin-bottom:2rem;}
    .section-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1rem;}
    .section-title{font-size:1rem;font-weight:700;color:#1a1a4e;}
    .section-count{font-size:0.7rem;padding:4px 10px;border-radius:20px;font-weight:600;}
    .count-red{background:#ffebee;color:#c62828;}
    .count-orange{background:#fff3e0;color:#e65100;}
    .count-green{background:#e8f5e9;color:#2e7d32;}
    .count-blue{background:#e3f2fd;color:#1565c0;}

    /* ── ALERT CARDS ── */
    .alert-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
    .alert-card{background:#fff;border-radius:14px;padding:1.2rem 1.4rem;box-shadow:0 4px 16px rgba(48,43,99,0.07);border-left:4px solid #eee;display:flex;align-items:flex-start;gap:14px;transition:transform 0.2s;}
    .alert-card:hover{transform:translateY(-2px);}
    .alert-card.orange{border-left-color:#ff9933;}
    .alert-card.blue{border-left-color:#1565c0;}
    .alert-card.green{border-left-color:#138808;}
    .alert-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .ico-orange{background:#fff3e0;color:#e65100;}
    .ico-blue{background:#e3f2fd;color:#1565c0;}
    .ico-green{background:#e8f5e9;color:#2e7d32;}
    .alert-title{font-size:0.85rem;font-weight:700;color:#1a1a4e;margin-bottom:4px;}
    .alert-detail{font-size:0.75rem;color:#888;line-height:1.7;}
    .alert-detail span{font-weight:600;color:#555;}
    .alert-time{font-size:0.65rem;color:#bbb;margin-top:6px;}

    /* ── MY QUOTA CARDS ── */
    .quota-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
    .quota-card{background:#fff;border-radius:14px;padding:1.3rem 1.4rem;box-shadow:0 4px 16px rgba(48,43,99,0.07);transition:transform 0.2s;}
    .quota-card:hover{transform:translateY(-2px);}
    .quota-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem;}
    .quota-item{font-size:0.88rem;font-weight:700;color:#1a1a4e;}
    .quota-badge{font-size:0.65rem;padding:4px 10px;border-radius:20px;font-weight:600;}
    .quota-row{display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:4px;}
    .quota-row span:first-child{color:#aaa;}
    .quota-row span:last-child{font-weight:600;color:#555;}
    .quota-prog-wrap{margin-top:10px;}
    .quota-prog-label{display:flex;justify-content:space-between;font-size:0.68rem;color:#aaa;margin-bottom:4px;}
    .quota-prog{height:6px;background:#f0f0f8;border-radius:3px;}
    .quota-prog-bar{height:6px;border-radius:3px;transition:width 0.5s;}

    /* ── EMPTY ── */
    .empty{background:#fff;border-radius:14px;padding:2.5rem;text-align:center;box-shadow:0 4px 16px rgba(48,43,99,0.05);}
    .empty-icon{font-size:2.5rem;margin-bottom:0.8rem;opacity:0.3;}
    .empty-text{font-size:0.82rem;color:#bbb;font-weight:500;}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-brand">
      <div class="nav-brand-name"><span class="o">Smart</span> Public Distribution <span class="g">System</span></div>
      <div class="nav-brand-sub">Customer Portal</div>
    </div>
    <div class="nav-right">
      <div class="nav-user-pill"><i class="bi bi-person-circle"></i><span id="navUserName">Customer</span></div>
      <a href="/customer/portal" class="nav-btn nav-btn-outline"><i class="bi bi-house"></i> My Portal</a>
      <a href="/customer-alerts.html" class="nav-btn nav-btn-active"><i class="bi bi-bell"></i> Alerts</a>
      <a href="/customer-settings.html" class="nav-btn nav-btn-outline"><i class="bi bi-gear"></i> Settings</a>
      <a href="/customer/logout" class="nav-btn nav-btn-outline"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>
  </div>

  <div class="page">
    <div class="topbar">
      <div>
        <h1>My Alerts</h1>
        <p>Track your quota usage and stock availability</p>
      </div>
      <button class="refresh-btn" onclick="loadAll()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
    </div>

    <!-- MY QUOTA USAGE -->
    <div class="section">
      <div class="section-hdr">
        <i class="bi bi-person-check" style="font-size:20px;color:#302b63;"></i>
        <div class="section-title">My Quota Usage</div>
        <span class="section-count count-blue" id="quotaCount">0 items</span>
      </div>
      <div id="quotaCards">
        <div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Loading...</div></div>
      </div>
    </div>

    <!-- LOW STOCK ALERTS -->
    <div class="section">
      <div class="section-hdr">
        <i class="bi bi-box-seam" style="font-size:20px;color:#e65100;"></i>
        <div class="section-title">Low Stock Alerts</div>
        <span class="section-count count-orange" id="lowStockCount">0 items</span>
      </div>
      <div id="lowStockCards">
        <div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Loading...</div></div>
      </div>
    </div>

    <!-- MY RECENT TRANSACTIONS -->
    <div class="section">
      <div class="section-hdr">
        <i class="bi bi-clock-history" style="font-size:20px;color:#138808;"></i>
        <div class="section-title">My Recent Transactions</div>
        <span class="section-count count-green" id="txCount">0 transactions</span>
      </div>
      <div id="txCards">
        <div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">Loading...</div></div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadAll();
      setInterval(loadAll, 30000);
    });

    async function checkAuth() {
      try {
        const res  = await fetch('/customer/me');
        const data = await res.json();
        if (!data.success) { window.location.href = '/'; return; }
        document.getElementById('navUserName').textContent = data.customer.name;
      } catch (err) { window.location.href = '/'; }
    }

    async function loadAll() {
      await loadQuota();
      await loadLowStock();
      await loadMyTransactions();
    }

    async function loadQuota() {
      try {
        const stockRes = await fetch('/customer/available-stock');
        const txRes    = await fetch('/customer/my-transactions');
        const stockData = await stockRes.json();
        const txData    = await txRes.json();

        const container = document.getElementById('quotaCards');
        const countEl   = document.getElementById('quotaCount');

        const itemsWithQuota = stockData.data.filter(i => i.per_person_quota > 0);
        countEl.textContent  = itemsWithQuota.length + ' items';

        if (itemsWithQuota.length === 0) {
          container.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No quota set for any items yet</div></div>`;
          return;
        }

        container.innerHTML = `<div class="quota-cards">${
          itemsWithQuota.map(item => {
            // Find total issued for this item from my transactions
            const myTx = txData.data.filter(t => t.item_name === item.item_name);
            const totalIssued = myTx.reduce((sum, t) => sum + parseFloat(t.quantity_issued), 0);
            const remaining   = item.total_quantity - item.distributed_quantity;
            const percent     = item.per_person_quota > 0
              ? Math.min((totalIssued / (item.per_person_quota * 4)) * 100, 100).toFixed(0)
              : 0;
            let barColor  = '#66bb6a';
            let badgeCls  = 'count-green';
            let badgeTxt  = 'Available';
            if (percent >= 100) { barColor = '#ef5350'; badgeCls = 'count-red';    badgeTxt = 'Fully Used'; }
            else if (percent > 50) { barColor = '#ffa726'; badgeCls = 'count-orange'; badgeTxt = 'Partially Used'; }

            return `
              <div class="quota-card">
                <div class="quota-hdr">
                  <div class="quota-item">${item.item_name}</div>
                  <span class="quota-badge ${badgeCls}">${badgeTxt}</span>
                </div>
                <div class="quota-row"><span>Per person quota</span><span>${item.per_person_quota} ${item.unit}</span></div>
                <div class="quota-row"><span>You have received</span><span>${totalIssued.toFixed(1)} ${item.unit}</span></div>
                <div class="quota-row"><span>Stock available</span><span>${remaining.toFixed(1)} ${item.unit}</span></div>
                <div class="quota-prog-wrap">
                  <div class="quota-prog-label"><span>Usage</span><span>${percent}%</span></div>
                  <div class="quota-prog"><div class="quota-prog-bar" style="width:${percent}%;background:${barColor};"></div></div>
                </div>
              </div>`;
          }).join('')
        }</div>`;
      } catch (err) { console.error('Quota error:', err); }
    }

    async function loadLowStock() {
      try {
        const res       = await fetch('/stock/alerts');
        const data      = await res.json();
        const container = document.getElementById('lowStockCards');
        const countEl   = document.getElementById('lowStockCount');
        countEl.textContent = data.data.length + ' items';

        if (data.data.length === 0) {
          container.innerHTML = `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">All stock levels are healthy</div></div>`;
          return;
        }

        container.innerHTML = `<div class="alert-cards">${
          data.data.map(item => {
            const remaining = (item.total_quantity - item.distributed_quantity).toFixed(1);
            const percent   = ((remaining / item.total_quantity) * 100).toFixed(0);
            return `
              <div class="alert-card orange">
                <div class="alert-ico ico-orange"><i class="bi bi-box-seam"></i></div>
                <div>
                  <div class="alert-title">${item.item_name} — Low Stock</div>
                  <div class="alert-detail">
                    Remaining: <span>${remaining} ${item.unit}</span> (${percent}% left)<br/>
                    Please collect your ration soon.
                  </div>
                </div>
              </div>`;
          }).join('')
        }</div>`;
      } catch (err) { console.error('Low stock error:', err); }
    }

    async function loadMyTransactions() {
      try {
        const res       = await fetch('/customer/my-transactions');
        const data      = await res.json();
        const container = document.getElementById('txCards');
        const countEl   = document.getElementById('txCount');
        countEl.textContent = data.data.length + ' transactions';

        if (data.data.length === 0) {
          container.innerHTML = `<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">No transactions yet</div></div>`;
          return;
        }

        container.innerHTML = `<div class="alert-cards">${
          data.data.slice(0, 6).map(tx => `
            <div class="alert-card green">
              <div class="alert-ico ico-green"><i class="bi bi-bag-check"></i></div>
              <div>
                <div class="alert-title">${tx.item_name} — ${tx.quantity_issued} ${tx.unit}</div>
                <div class="alert-detail">
                  Issued by: <span>${tx.issued_by_name}</span><br/>
                  Card: <span>${tx.ration_card_no}</span>
                </div>
                <div class="alert-time">${new Date(tx.issued_at).toLocaleString('en-IN')}</div>
              </div>
            </div>`).join('')
        }</div>`;
      } catch (err) { console.error('TX error:', err); }
    }
  </script>

</body>
</html>
